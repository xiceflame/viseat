<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisEat - 图片分析审计</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #0b0f1a;
      --sidebar: #111827;
      --card: #161e2e;
      --card-hover: #1f2937;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    aside {
      width: 240px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px 32px;
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }
    nav { flex: 1; }
    nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--muted);
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: all 0.2s;
      font-size: 14px;
    }
    nav a:hover, nav a.active {
      background: var(--card-hover);
      color: var(--text);
    }
    nav a.active {
      color: var(--accent);
      background: var(--accent-glow);
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .header-left h1 { margin: 0; font-size: 24px; font-weight: 700; }
    .header-left p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

    .audit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
    }

    .audit-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .image-container {
      width: 100%;
      height: 250px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-in;
    }
    .image-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .analysis-details {
      padding: 16px;
      flex: 1;
    }
    .analysis-details h3 {
      margin: 0 0 12px;
      font-size: 16px;
      color: var(--accent);
    }
    .food-tag {
      display: inline-block;
      padding: 4px 8px;
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent);
      border-radius: 4px;
      font-size: 12px;
      margin: 0 4px 4px 0;
    }
    .json-preview {
      background: #000;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 11px;
      color: #10b981;
      overflow-x: auto;
      margin-top: 12px;
      max-height: 200px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }

    .pagination {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding-bottom: 48px;
    }
    .btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--card-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Modal for Image Zoom */
    #imageModal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    #imageModal img { max-width: 100%; max-height: 100%; }
    #imageModal.active { display: flex; }
  </style>
</head>
<body>
  <aside>
    <div class="brand">
      <i data-lucide="layout-dashboard"></i>
      <span>VisEat Admin</span>
    </div>
    <nav>
      <a href="/dashboard"><i data-lucide="bar-chart-2"></i>概览监控</a>
      <a href="/image-audit" class="active"><i data-lucide="image"></i>图片审查</a>
      <a href="/users-admin"><i data-lucide="users"></i>用户管理</a>
    </nav>
  </aside>

  <main>
    <header>
      <div class="header-left">
        <h1>图片分析审查</h1>
        <p>审查 AI 识别结果与实际图片的对应情况</p>
      </div>
    </header>

    <div class="audit-grid" id="auditGrid">
      <!-- Cards will be injected here -->
    </div>

    <div class="pagination">
      <button class="btn" id="prevPage" onclick="changePage(-1)">上一页</button>
      <span id="pageInfo" style="line-height: 36px;">第 1 页</span>
      <button class="btn" id="nextPage" onclick="changePage(1)">下一页</button>
    </div>
  </main>

  <div id="imageModal" onclick="this.classList.remove('active')">
    <img id="modalImg" src="" alt="Full view" />
  </div>

  <script>
    let currentPage = 1;
    const pageSize = 12;

    async function loadImages() {
      try {
        const skip = (currentPage - 1) * pageSize;
        const response = await fetch(`/api/v1/admin/dashboard/recent-images?limit=${pageSize}&skip=${skip}`);
        const data = await response.json();
        
        const grid = document.getElementById('auditGrid');
        grid.innerHTML = '';
        
        data.images.forEach(img => {
          const card = document.createElement('div');
          card.className = 'audit-card';
          
          let analysisHtml = '<p style="color:var(--muted)">暂无 AI 分析数据</p>';
          if (img.analysis) {
            const foods = img.analysis.foods || [];
            analysisHtml = `
              <div style="margin-bottom:8px">
                ${foods.map(f => `<span class="food-tag">${f.name || f.dish_name || f.dish_name_cn || '未知'}</span>`).join('')}
              </div>
              <div class="json-preview">${JSON.stringify(img.analysis, null, 2)}</div>
            `;
          }

          card.innerHTML = `
            <div class="image-container" onclick="openModal('${img.image_url}')">
              <img src="${img.image_url}" alt="Captured Image">
            </div>
            <div class="analysis-details">
              <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:8px">
                <h3 style="margin:0">${img.label || '识别结果'}</h3>
                <span style="font-size:11px; padding:2px 6px; background:var(--border); border-radius:4px; color:var(--muted)">ID: ${img.id.substring(0,8)}</span>
              </div>
              ${analysisHtml}
              <div class="meta">
                <span><i data-lucide="user" style="width:12px;height:12px;vertical-align:middle;margin-right:4px"></i>${img.user_id}</span>
                <span><i data-lucide="calendar" style="width:12px;height:12px;vertical-align:middle;margin-right:4px"></i>${new Date(img.captured_at).toLocaleString()}</span>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

        document.getElementById('pageInfo').innerText = `第 ${currentPage} 页`;
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = data.images.length < pageSize;

      } catch (error) {
        console.error('Failed to load images:', error);
      }
    }

    function openModal(url) {
      const modal = document.getElementById('imageModal');
      const img = document.getElementById('modalImg');
      img.src = url;
      modal.classList.add('active');
    }

    function changePage(delta) {
      currentPage += delta;
      loadImages();
      document.querySelector('main').scrollTop = 0;
    }

    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      loadImages();
    });
  </script>
</body>
</html>
